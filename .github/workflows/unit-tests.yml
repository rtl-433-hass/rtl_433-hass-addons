name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run BATS tests
        run: bats -r tests/
