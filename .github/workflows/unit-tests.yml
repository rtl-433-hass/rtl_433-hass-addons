name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run BATS tests
        run: bats -r tests/
