name: Docs

"on":
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "mkdocs.yml"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - name: Build docs
        run: uv run --with-requirements docs/requirements.txt mkdocs build --strict

  publish:
    name: Publish docs
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish versioned docs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            uv run --with-requirements docs/requirements.txt mike deploy --push dev
          elif [[ "$GITHUB_REF_NAME" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            uv run --with-requirements docs/requirements.txt mike deploy --push --update-aliases "$version" latest
            uv run --with-requirements docs/requirements.txt mike set-default --push latest
          else
            echo "Unsupported docs publishing ref: $GITHUB_REF" >&2
            exit 1
          fi
