name: Validate JSON files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  json-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f -not -path "./.claude/*" -exec jq empty {} \;
