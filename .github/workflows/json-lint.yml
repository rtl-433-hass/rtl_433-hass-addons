name: Validate JSON files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  json-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f -not -path "./.claude/*" -exec jq empty {} \;
