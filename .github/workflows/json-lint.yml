name: Validate JSON files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  json-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f -not -path "./.claude/*" -exec jq empty {} \;
