name: Validate JSON files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  json-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f -not -path "./.claude/*" -exec jq empty {} \;
